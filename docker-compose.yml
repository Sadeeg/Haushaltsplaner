version: '3.8'

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist/haushaltsplaner/browser:/usr/share/nginx/html:ro
    depends_on:
      - spring
    networks:
      - app-net

  spring:
    image: haushaltsplaner-spring
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/haushalt
      - SPRING_DATASOURCE_USER=postgres
      - SPRING_DATASOURCE_PASSWORD=test12345
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=haushalt
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=test12345
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  telegram-bot:
    image: haushaltsplaner-telegram-bot
    environment:
      - TELEGRAM_BOT_TOKEN=8655000879:AAF8AMSxGx7bRD-Yh1gl_M_0IgUVDQQZ8Y8
      - API_URL=http://spring:8080
    depends_on:
      - spring
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  postgres-data:
