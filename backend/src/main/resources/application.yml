spring:
  application:
    name: haushaltsplaner

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/haushalt}
    username: ${SPRING_DATASOURCE_USER:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080
  servlet:
    context-path: /

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}

logging:
  level:
    com.haushaltsplaner: INFO
    org.springframework.security: INFO
